spring:
  application:
    name: AIVoice-test

openclaw:
  base-url: http://127.0.0.1:18789
  token: test-token
  default-model: openclaw
  endpoint:
    chat: /v1/chat/completions
    models: /v1/models
  timeout:
    connect: 1s
    read: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info

aivoice:
  cors:
    enabled: true
    path-pattern: /api/**
    allowed-origin-patterns:
      - http://localhost:[*]
      - http://127.0.0.1:[*]
      - https://app.test.aivoice.cloudzao.com
    allowed-methods:
      - GET
      - POST
      - OPTIONS
    allowed-headers:
      - "*"
    exposed-headers:
      - Content-Disposition
    allow-credentials: false
    max-age: 1h
