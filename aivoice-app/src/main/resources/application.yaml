spring:
  application:
    name: AIVoice
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: 8080
  error:
    include-stacktrace: never

openclaw:
  base-url: ${OPENCLAW_GATEWAY_URL:http://127.0.0.1:18789}
  token: ${OPENCLAW_GATEWAY_TOKEN:}
  default-model: ${OPENCLAW_DEFAULT_MODEL:openclaw}
  endpoint:
    chat: /v1/chat/completions
    models: /v1/models
  timeout:
    connect: 5s
    read: 60s

# 全局跨域（CORS）配置
# 仅对 path-pattern 路径生效；/actuator、/swagger-ui、/v3/api-docs 等同源访问端点不受影响
# 生产环境应通过 AIVOICE_CORS_ALLOWED_ORIGINS 环境变量收紧到具体域名
aivoice:
  cors:
    enabled: ${AIVOICE_CORS_ENABLED:true}
    path-pattern: /api/**
    allowed-origin-patterns:
      # 本地开发：localhost / 127.0.0.1 任意端口
      - http://localhost:[*]
      - http://127.0.0.1:[*]
      - https://localhost:[*]
      - https://127.0.0.1:[*]
      # 移动端 WebView（Capacitor / Ionic / Cordova 常见 origin）
      - capacitor://localhost
      - ionic://localhost
      - http://localhost
      # 生产环境（按需在 application-prod.yaml 中覆盖，或用环境变量补充）
      # - https://*.aivoice.cloudzao.com
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      - HEAD
    allowed-headers:
      - "*"
    # 客户端默认只能读取 6 个 simple header；如果未来需要在 SSE / 下载场景暴露自定义头，在此追加
    exposed-headers:
      - Content-Disposition
    allow-credentials: false
    max-age: 1h

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
  packages-to-scan: com.cloudzao.aivoice
  paths-to-match: /api/**
  default-produces-media-type: application/json
  show-actuator: false

logging:
  level:
    com.cloudzao.aivoice: INFO
